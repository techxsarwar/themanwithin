<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | The Man Within</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="community.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:,">
</head>
<body class="community-page">

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container container">
            <a href="index.html" class="logo">The Man Within</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">The Book</a></li>
                <li><a href="author.html">The Author</a></li>
                <li><a href="community.html" class="active">Community</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="index.html#buy" class="nav-cta">Get Your Copy</a></li>
            </ul>
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>


    <section class="community-section">
        <div id="community-chat-container" class="community-chat-container reveal reveal-bottom">
            
            <!-- Lobby / Join Screen -->
            <div id="chat-auth-screen" class="chat-lobby active">
                <div class="lobby-content">
                    <div class="auth-card">
                        <div class="auth-header">
                            <i class="fas fa-comments lobby-icon" style="color: #00a884; font-size: 2.5rem; margin-bottom: 1rem;"></i>
                            <h2>Community Chat</h2>
                            <p>Join the conversation with readers and the author.</p>
                        </div>

                        <div class="auth-toggle">
                            <button id="tab-guest" class="auth-tab active" onclick="switchAuthMode('guest')">Guest Reader</button>
                            <button id="tab-admin" class="auth-tab" onclick="switchAuthMode('admin')">Author Identity</button>
                        </div>

                        <div id="form-guest" class="auth-form active">
                            <div class="input-group">
                                <i class="fas fa-signature"></i>
                                <input type="text" id="chat-guest-name" class="form-control" placeholder="Choose a Pen Name">
                            </div>
                            <button class="btn btn-secondary w-full" onclick="joinChat('guest')">Join Chat</button>
                        </div>

                        <div id="form-admin" class="auth-form">
                            <div class="input-group">
                                <i class="fas fa-key"></i>
                                <input type="password" id="chat-admin-pass" class="form-control" placeholder="Verify Secret Key">
                            </div>
                            <button class="btn btn-primary w-full" onclick="joinChat('admin')">Verify Author Access</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Chat Screen -->
            <div id="chat-interface-screen" class="chat-full-interface" style="display: none;">
                <div class="chat-main-header">
                    <div class="chat-user-info">
                        <div class="chat-user-details">
                            <h3>The Man Within Community</h3>
                            <div class="status-indicator">
                                <span class="status-dot-live"></span>
                                <span id="active-user-display">Connecting...</span>
                            </div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <i class="fas fa-ellipsis-v" style="color: #8696a0; cursor: pointer;"></i>
                    </div>
                </div>
                
                <div id="chat-messages" class="chat-messages-area">
                    <!-- Messages injected by JS -->
                </div>

                <div class="chat-footer-input">
                    <input type="text" id="chat-input" class="form-control" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                    <button class="btn send-btn" onclick="sendChatMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

        </div>
    </section>


    <script src="script.js"></script>
</body>
</html>
